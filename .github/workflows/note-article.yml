name: Note Article Generation

on:
  schedule:
    # 火曜日と金曜日の6:00（日本時間）= UTC 21:00（前日）
    - cron: '0 21 * * 1,4'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check files
        run: |
          echo "Checking files..."
          ls -la
          echo ""
          echo "Checking inputs folder..."
          ls -la inputs/ || echo "inputs folder not found"
