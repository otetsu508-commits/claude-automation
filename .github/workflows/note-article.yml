name: Note Article Generation

on:
  schedule:
    # 火曜日と金曜日の6:00（日本時間）= UTC 21:00（前日）
    - cron: '0 21 * * 1,4'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic pyyaml requests

      - name: Get today's theme from calendar
        id: get-theme
        run: |
          python scripts/get_today_theme.py

      - name: Run 5-agent pipeline
        id: pipeline
        if: steps.get-theme.outputs.theme_found == 'true'
        run: |
          python scripts/run_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push generated content
        if: steps.get-theme.outputs.theme_found == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add outputs/ inputs/themes/
          git diff --staged --quiet || git commit -m "Generate article: $(date '+%Y-%m-%d')"
          git push

      - name: Send email notification
        if: always()
        run: |
          python scripts/send_notification.py
        env:
          GMAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          WORKFLOW_STATUS: ${{ job.status }}
          THEME_FOUND: ${{ steps.get-theme.outputs.theme_found }}
          THEME_NAME: ${{ steps.get-theme.outputs.theme_name }}
